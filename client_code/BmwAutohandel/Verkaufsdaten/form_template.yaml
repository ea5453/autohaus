components:
- components:
  - event_bindings: {}
    layout_properties: {grid_position: 'VXCBPY,VQNDGM'}
    name: drop_down_verkaufer
    properties:
      items: [Mitarbeiter auswählen]
    type: DropDown
  - components:
    - name: repeating_panel_verkauf
      properties: {item_template: BmwAutohandel.Verkaufsdaten.RowTemplate7}
      type: RepeatingPanel
    layout_properties: {grid_position: 'YMOFVR,QBKUXM'}
    name: data_grid_1
    properties:
      columns:
      - {data_key: Preis, id: WVRYST, title: Verkaufspreis}
      - {data_key: Datum, id: CMBUKM, title: Verkaufs datum}
      - {data_key: WIN, id: JTVPOK, title: WIN}
    type: DataGrid
  - components:
    - layout_properties: {grid_position: 'MYZZQW,HSUPUZ'}
      name: label_2
      properties: {align: left, font_size: 16, text: 'Summe Verkauf:'}
      type: Label
    - layout_properties: {grid_position: 'MYZZQW,BTKJFI'}
      name: label_summe
      properties: {align: center, bold: true, font_size: 17, italic: false, underline: true}
      type: Label
    layout_properties: {grid_position: 'BGKWCX,TSITSR'}
    name: column_panel_1
    properties: {}
    type: ColumnPanel
  - event_bindings: {}
    layout_properties: {grid_position: 'UUHVTM,GOEDEZ'}
    name: plot_1
    properties: {}
    type: Plot
  - event_bindings: {}
    layout_properties: {grid_position: 'ZKBTLT,YHBSSC'}
    name: button_back_to_Verkauf
    properties: {font: '', text: Zurück}
    type: Button
  layout_properties: {slot: default}
  name: content_panel
  properties: {}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- layout_properties: {slot: title}
  name: label_1
  properties: {text: Verkaufsdaten}
  type: Label
container:
  properties: {html: '@theme:standard-page.html'}
  type: HtmlTemplate
is_package: true
